# Example targets file for facebook-scraper
#
# Feed to the scraper:
#   python main.py scrape --from-file targets_example.yaml
#
# This flat-list format is what collect_urls.py produces.
# Each entry requires: type, url, category
#
# Supported URL formats:
#   https://www.facebook.com/{page_slug}/posts/{post_id}
#   https://www.facebook.com/permalink.php?story_fbid={fbid}&id={page_id}

- type: post
  url: https://www.facebook.com/vnexpress.net/posts/pfbid0ExamplePostId1111111
  category: tin_tuc

- type: post
  url: https://www.facebook.com/PageWSS/posts/pfbid0ExamplePostId2222222
  category: hai_meme

- type: post
  url: https://www.facebook.com/permalink.php?story_fbid=333333333333333&id=100000000000001
  category: am_thuc
